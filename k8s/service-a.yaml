apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      serviceAccountName: service-a
      containers:
      - name: app
        image: curlimages/curl
        command: ["sleep","3600"]