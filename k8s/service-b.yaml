apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      serviceAccountName: service-b
      containers:
      - name: app
        image: hashicorp/http-echo
        args:
          - "-text=Hello from Service B"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: prod
spec:
  selector:
    app: service-b
  ports:
  - port: 80
    targetPort: 5678