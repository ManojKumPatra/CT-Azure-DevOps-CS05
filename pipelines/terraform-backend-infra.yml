trigger: none

pool:
  name: Default   # your self-hosted agent

variables:
  terraformVersion: '1.6.6'

stages:

# =============================================
# STAGE 1 – BOOTSTRAP BACKEND - Terraform Plan
# =============================================
- stage: Terraform_Plan
  displayName: Terraform Plan (Bootstrap Backend)
  jobs:
  - job: Plan
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Terraform Plan
      inputs:
        azureSubscription: azure-mi-connection
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          $ErrorActionPreference = "Stop"

          $bootstrapDir = "$(Build.SourcesDirectory)\infra\terraform-backend-bootstrap"
          cd $bootstrapDir

          terraform init -reconfigure
          terraform validate
          terraform plan -out=tfplan
          terraform show tfplan

    # ✅ Publish the plan file
    - publish: $(Build.SourcesDirectory)\infra\terraform-backend-bootstrap\tfplan
      artifact: tfplan


# =============================================================
# STAGE 2 – BOOTSTRAP BACKEND - Terraform APPLY (with approval)
# =============================================================

- stage: Terraform_Apply
  displayName: Terraform Apply (Bootstrap Backend)
  dependsOn: Terraform_Plan
  jobs:
  - deployment: Apply
    displayName: Apply Backend Terraform
    environment: terraform-backend-prod   # ✅ approval gate here
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          # ✅ Download the plan artifact
          - download: current
            artifact: tfplan

          - task: AzureCLI@2
            displayName: Terraform Apply
            inputs:
              azureSubscription: azure-mi-connection
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = "Stop"

                $bootstrapDir = "$(Build.SourcesDirectory)\infra\terraform-backend-bootstrap"
                cd $bootstrapDir

                terraform init -reconfigure
                terraform apply "$(Pipeline.Workspace)\tfplan\tfplan"